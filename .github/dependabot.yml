version: 2
updates:
  # Frontend — npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(frontend)"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    labels:
      - "dependencies"
      - "frontend"

  # Backend — pip
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(backend)"
    labels:
      - "dependencies"
      - "backend"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(github-actions)"
    labels:
      - "dependencies"

  # Docker — backend image
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(backend-docker)"
    labels:
      - "dependencies"
      - "docker"
      - "backend"

  # Docker — frontend image
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "develop"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(frontend-docker)"
    labels:
      - "dependencies"
      - "docker"
      - "frontend"
